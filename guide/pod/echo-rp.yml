apiVersion: v1 # 쿠버네티스 API 버전
kind: Pod # 리소스 종류 (Pod)
metadata:
  name: echo-rp # Pod 이름
  labels:
    app: echo # Pod에 부여할 레이블 (Service 등에서 셀렉터로 사용)
spec:
  containers:
    - name: app # 컨테이너 이름
      image: ghcr.io/subicura/echo:v1 # 사용할 컨테이너 이미지
      readinessProbe: # 준비 상태 점검 (실패 시 트래픽을 받지 않음)
        httpGet:
          path: /not/exist # HTTP GET 요청 경로 (의도적으로 존재하지 않는 경로 → 항상 실패)
          port: 8080 # 요청을 보낼 포트
        initialDelaySeconds: 5 # 컨테이너 시작 후 첫 점검까지 대기 시간(초)
        timeoutSeconds: 2 # 응답 대기 타임아웃 (기본값 1초)
        periodSeconds: 5 # 점검 주기 (기본값 10초)
        failureThreshold: 1 # 연속 실패 허용 횟수 (기본값 3회) — 1회 실패 시 Not Ready 처리