apiVersion: apps/v1            # ReplicaSet 리소스의 API 버전
kind: ReplicaSet               # 리소스 종류 (ReplicaSet: Pod 복제본 수를 보장하는 컨트롤러)
metadata:
  name: echo-rs                # ReplicaSet의 이름
spec:
  replicas: 4                  # 유지할 Pod 복제본 개수 (기존 echo-rs.yml에서 4개로 스케일 아웃)
  selector:                    # 관리할 Pod를 선택하는 라벨 셀렉터
    matchLabels:
      app: echo                # app=echo 라벨을 가진 Pod 선택
      tier: app                # tier=app 라벨을 가진 Pod 선택
  template:                    # 생성할 Pod의 템플릿 정의
    metadata:
      labels:                  # Pod에 부여할 라벨 (위 selector와 일치해야 함)
        app: echo
        tier: app
    spec:
      containers:              # Pod 내부에서 실행할 컨테이너 목록
        - name: echo           # 컨테이너 이름
          image: ghcr.io/subicura/echo:v1   # 사용할 컨테이너 이미지
