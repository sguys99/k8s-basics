apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-deploy-st
spec:
  replicas: 4 # 유지할 Pod 개수
  selector:
    matchLabels:
      app: echo
      tier: app
  minReadySeconds: 5 # Pod가 Ready 상태가 된 후 사용 가능으로 판단하기까지 대기 시간(초)
  strategy:
    type: RollingUpdate # 무중단 배포를 위한 롤링 업데이트 방식
    rollingUpdate:
      maxSurge: 3 # 업데이트 중 replicas 기준 초과 생성 가능한 Pod 수
      maxUnavailable: 3 # 업데이트 중 사용 불가능 상태로 허용되는 Pod 수
  template:
    metadata:
      labels:
        app: echo
        tier: app
    spec:
      containers:
        - name: echo
          image: ghcr.io/subicura/echo:v1
          livenessProbe: # 컨테이너 정상 동작 여부를 주기적으로 확인
            httpGet:
              path: /
              port: 3000
